[project]
name = "a2a-pydantic"
version = "0.1.0"
description = "Pydantic models for the A2A protocol with dual v0.3/v1.0 support and zero protobuf dependency."
readme = "README.md"
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "a2a-pydantic contributors" }]
keywords = ["a2a", "agent2agent", "pydantic", "protocol", "ai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
proto = ["protobuf>=5.0"]
dev = [
    "pytest>=8.0",
    "black>=24.0",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://github.com/a2aproject/a2a-pydantic"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["a2a_pydantic"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.black]
line-length = 88
target-version = ["py313"]

[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
    "_a2a_v03_reference.py",
    "a2a_pb2.py",
    "a2a_pb2.pyi",
    "a2a_pb2_grpc.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",  # line length handled by black
    "B008",  # FastAPI uses Body(...) as default
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B018"]
"examples/*" = ["E402"]
